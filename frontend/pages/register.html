<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CPMS</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            background-color: #f8fafc;
            color: var(--text-main);
            font-family: inherit;
        }
        select:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>
<body>
    <header>
        <h1>CPMS</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Create an Account</h2>
            <p>Join the Cloud-Based Professor Management System.</p>
            
            <div id="alert-box" class="alert"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="Dr. John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john.doe@cpms.edu">
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select id="role" required>
                        <option value="professor">Professor</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Create a strong password">
                </div>
                <button type="submit" id="submit-btn" class="btn-primary" style="width: 100%; margin-top: 1rem;">Sign Up</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light); margin-bottom: 0;">
                Already have an account? <a href="./login.html" style="color: var(--primary-color); font-weight: 600;">Log In</a>
            </p>
        </div>
    </div>

    <script type="module" src="../js/register.js"></script>
</body>
</html>
