<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CPMS</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>CPMS</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Welcome back</h2>
            <p>Enter your credentials to access the CPMS dashboard.</p>
            
            <div id="alert-box" class="alert"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="admin@cpms.edu">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" id="submit-btn" class="btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>
            
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-light); margin-bottom: 0;">
                Don't have an account? <a href="./register.html" style="color: var(--primary-color); font-weight: 600;">Sign Up</a>
            </p>
        </div>
    </div>

    <script type="module" src="../js/login.js"></script>
</body>
</html>
