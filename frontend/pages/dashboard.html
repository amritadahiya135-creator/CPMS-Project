<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CPMS</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 250px;
            background: var(--surface-color);
            box-shadow: var(--shadow-sm);
            padding: 2rem 1rem;
        }
        .sidebar h2 {
            color: var(--primary-color);
            margin-bottom: 2rem;
            padding-left: 1rem;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar li a {
            display: block;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: var(--secondary-color);
            font-weight: 600;
            margin-bottom: 0.5rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .sidebar li a:hover, .sidebar li a.active {
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary-color);
        }
        .content {
            flex: 1;
            padding: 2rem;
        }
        .card {
            background: white;
            padding: 1.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <h2>CPMS Core</h2>
            <ul id="nav-links">
                <li><a data-view="overview" class="active">Overview</a></li>
                <li><a data-view="professors">Professors</a></li>
                <li><a data-view="subjects">Subjects</a></li>
            </ul>
            <ul style="margin-top: auto; padding-top: 2rem;">
                <li><a id="logout-btn" style="color: var(--error-color);">Log Out</a></li>
            </ul>
        </aside>

        <main class="content">
            <header class="dashboard-header" style="box-shadow:none; padding:0; margin-bottom:2rem; background:transparent;">
                <h1 id="view-title">Overview</h1>
                <div id="user-info" style="font-weight:600; color:var(--secondary-color);"></div>
            </header>

            <!-- Dynamic Views -->
            <section id="view-overview">
                <div class="grid-cards">
                    <div class="stat-card">
                        <h3 style="color:var(--text-light); font-size:0.9rem;">System Status</h3>
                        <p style="font-size:1.5rem; font-weight:800; color:var(--success-color);">Operational</p>
                    </div>
                    <div class="stat-card">
                        <h3 style="color:var(--text-light); font-size:0.9rem;">Active Role</h3>
                        <p id="role-display" style="font-size:1.5rem; font-weight:800; text-transform:capitalize;">...</p>
                    </div>
                </div>
            </section>

            <section id="view-professors" class="hidden">
                <div class="card">
                    <h3 style="margin-bottom: 1rem;">Registered Professors</h3>
                    <div id="professors-list">Loading...</div>
                </div>
            </section>

            <section id="view-subjects" class="hidden">
                <div class="card">
                    <h3 style="margin-bottom: 1rem;">Subject Allocations</h3>
                    <div id="subjects-list">Loading...</div>
                </div>
            </section>

        </main>
    </div>

    <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
