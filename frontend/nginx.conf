server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Handle client-side routing by redirecting all 404s to index.html (Useful for SPAs)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets like CSS and JS to improve performance
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
